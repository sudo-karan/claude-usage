name: Build APK

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', 'gradle/libs.versions.toml') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build debug + release APKs
        run: ./gradlew assembleDebug assembleRelease --stacktrace

      - name: Stage APKs
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/debug/app-debug.apk dist/ClaudeUsage-debug.apk
          cp app/build/outputs/apk/release/app-release.apk dist/ClaudeUsage-release.apk
          ls -la dist

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: claude-usage-apks
          path: dist/*.apk
          if-no-files-found: error

      # Rolling "latest" pre-release so there's always a one-tap download link.
      - name: Publish rolling release
        if: github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest build
          prerelease: true
          body: |
            Automated build of **Claude Usage** from `${{ github.ref_name }}` (`${{ github.sha }}`).
            Install `ClaudeUsage-release.apk` on your phone (enable "install from unknown sources").
          files: dist/*.apk

      # Tagged versions become full releases.
      - name: Publish tagged release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.apk
          generate_release_notes: true
